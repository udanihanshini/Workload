<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workload Balance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay"></div>

  <header class="app-header">
    <div class="header-left">
      <div class="logo-mark">WB</div>
      <div>
        <h1>Workload<span class="accent">.</span></h1>
        <p class="subtitle">Balance every dimension of your day</p>
      </div>
    </div>
    <div class="header-right">
      <div class="live-clock" id="liveClock"></div>
      <button id="clearAllBtn" class="danger-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>
        Clear All
      </button>
    </div>
  </header>

  <main class="container">

    <section class="summary-grid">
      <div class="summary-card" data-index="0">
        <div class="summary-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <p class="summary-label">Total Tasks</p>
          <p class="summary-value" id="totalTasks">0</p>
        </div>
      </div>
      <div class="summary-card" data-index="1">
        <div class="summary-icon green">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div>
          <p class="summary-label">Completed</p>
          <p class="summary-value" id="completedTasks">0</p>
        </div>
      </div>
      <div class="summary-card" data-index="2">
        <div class="summary-icon yellow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"></polyline></svg>
        </div>
        <div>
          <p class="summary-label">Pending</p>
          <p class="summary-value" id="pendingTasks">0</p>
        </div>
      </div>
      <div class="summary-card status-card" data-index="3">
        <div class="summary-icon purple">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        </div>
        <div>
          <p class="summary-label">Balance Status</p>
          <p class="summary-value" id="balanceStatus">Good</p>
        </div>
      </div>
    </section>

    <div class="main-grid">

      <section class="card form-card">
        <div class="card-header">
          <h2>Add Activity</h2>
          <span class="card-tag">New</span>
        </div>

        <form id="taskForm">
          <div class="form-grid">
            <div class="input-group span-2">
              <label for="title">Activity Title</label>
              <input type="text" id="title" placeholder="e.g. Robotics lecture notes" required />
            </div>

            <div class="input-group">
              <label for="category">Category</label>
              <select id="category" required>
                <option value="Academics">📚 Academics</option>
                <option value="Lectures">🎓 Lectures</option>
                <option value="File Management">🗂️ File Management</option>
                <option value="Leisure">🎮 Leisure</option>
                <option value="External Courses">🌐 External Courses</option>
                <option value="Personal">👤 Personal</option>
              </select>
            </div>

            <div class="input-group">
              <label for="priority">Priority</label>
              <select id="priority" required>
                <option value="High">🔴 High</option>
                <option value="Medium" selected>🟡 Medium</option>
                <option value="Low">🟢 Low</option>
              </select>
            </div>

            <div class="input-group">
              <label for="date">Target Date</label>
              <input type="date" id="date" required />
            </div>

            <div class="input-group">
              <label for="time">Time</label>
              <input type="time" id="time" />
            </div>

            <div class="input-group">
              <label for="duration">Duration (hrs)</label>
              <input type="number" id="duration" min="0.5" step="0.5" value="1" required />
            </div>

            <div class="input-group span-3">
              <label for="notes">Notes / Details</label>
              <textarea id="notes" rows="2" placeholder="Add notes, file location, lecture topic, or course link..."></textarea>
            </div>
          </div>

          <button type="submit" class="primary-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add Activity
          </button>
        </form>
      </section>

      <section class="card timeline-card">
        <div class="card-header">
          <h2>Timeline</h2>
          <span class="card-tag">Schedule</span>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>
    </div>

    <section class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search activities..." />
      </div>
      <select id="filterCategory">
        <option value="All">All Categories</option>
        <option value="Academics">Academics</option>
        <option value="Lectures">Lectures</option>
        <option value="File Management">File Management</option>
        <option value="Leisure">Leisure</option>
        <option value="External Courses">External Courses</option>
        <option value="Personal">Personal</option>
      </select>
      <select id="filterStatus">
        <option value="All">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>
    </section>

    <section class="card task-section">
      <div class="card-header">
        <h2>Activity List</h2>
        <span class="card-tag" id="taskCount">0 items</span>
      </div>
      <div id="taskList" class="task-list"></div>
    </section>

    <section class="card chart-section">
      <div class="card-header">
        <h2>Workload by Category</h2>
        <span class="card-tag">Hours</span>
      </div>
      <div id="categoryBars" class="category-bars"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
